{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>{{ titulo }}</h2>
    <form method="POST" class="card p-4 shadow">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
            <button class="btn btn-success">Guardar</button>
            <a href="{% url 'lista_virtuales' %}" class="btn btn-secondary">Volver</a>
        </div>
    </form>
</div>
{% endblock %}

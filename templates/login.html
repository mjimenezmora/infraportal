<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #611232; /* El azul vibrante de tu imagen */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor de la ilustración de fondo */
        .illustration-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .illustration-bg img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        /* Tarjeta de Login Estilo Imagen */
        .login-box {
            background-color: rgba(153, 39, 40, 0.8); /* Azul oscuro semitransparente */
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            z-index: 10; /* Por encima de la ilustración */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .avatar-icon {
            font-size: 4rem;
            color: white;
            margin-bottom: 20px;
        }

        /* Inputs personalizados */
        .form-control-custom {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.5);
            border-radius: 0;
            color: white;
            padding: 10px 5px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .form-control-custom:focus {
            background: transparent;
            color: white;
            outline: none;
            box-shadow: none;
            border-bottom-color: #00d4ff;
        }

        .form-control-custom::placeholder {
            color: rgba(255,255,255,0.7);
        }

        /* Botón estilo "CONTINUE" */
        .btn-continue {
            background-color: #D4A373;
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 12px;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-continue:hover {
            background-color: #00d4ff;
        }

    </style>
</head>

<body>

    <div class="illustration-bg">
        {% load static %}
        <img src="{% static 'img/logomora.jpg' %}" alt="Logo">
    </div>

    <div class="login-box">
        <div class="avatar-icon">
            <i class="bi bi-person-circle"></i>
        </div>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control-custom w-100" 
                   type="text" 
                   name="username" 
                   placeholder="USUARIO" 
                   required>

            <input class="form-control-custom w-100" 
                   type="password" 
                   name="password" 
                   placeholder="CONTRASEÑA" 
                   required>

            <button class="btn btn-primary btn-continue w-100 mt-3">
                CONTINUE
            </button>
        </form>

        {% if error %}
        <div class="alert alert-danger mt-4 py-2 small">
            {{ error }}
        </div>
        {% endif %}
    </div>

</body>
</html>
